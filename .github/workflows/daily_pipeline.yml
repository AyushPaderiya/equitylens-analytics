name: EquityLens Daily Pipeline

on:
  schedule:
    # 21:30 UTC = 4:30 PM EST = after NYSE close, every Friday
    - cron: "30 21 * * 5"

  # Allow manual trigger from GitHub UI (useful for testing)
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force refresh all data (bypass cache)"
        required: false
        default: false
        type: boolean

jobs:
  run-pipeline:
    name: Extract → Transform → Load
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Step 1: Checkout code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Step 3: Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy==1.26.4"
          pip install -r requirements.txt

      # ── Step 4: Create .env from GitHub Secrets ─────────────────────────────
      # GitHub Secrets → Settings → Secrets and variables → Actions
      - name: Create .env file
        run: |
          echo "FRED_API_KEY=${{ secrets.FRED_API_KEY }}"           >> .env
          echo "ALPHA_VANTAGE_KEY=${{ secrets.ALPHA_VANTAGE_KEY }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"           >> .env
          echo "LOG_LEVEL=INFO"                                      >> .env
          echo "ENVIRONMENT=production"                              >> .env

      # ── Step 5: Run extraction ──────────────────────────────────────────────
      - name: Run extraction pipeline
        run: |
          if [ "${{ github.event.inputs.force_refresh }}" == "true" ]; then
            python -m src.pipeline.run_extraction --force
          else
            python -m src.pipeline.run_extraction
          fi

      # ── Step 6: Run ETL + load ──────────────────────────────────────────────
      - name: Run main ETL pipeline
        run: python -m src.pipeline.main_pipeline --load-only

      # ── Step 7: Deploy analytics views ─────────────────────────────────────
      - name: Deploy analytics layer
        run: python -m src.pipeline.run_analytics_layer

      # ── Step 8: Upload logs as artifact ────────────────────────────────────
      - name: Upload pipeline logs
        if: always() # Upload even if pipeline fails
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/pipeline.log
          retention-days: 7

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: run-pipeline
    if: failure()
    steps:
      - name: Pipeline failed notification
        run: |
          echo "Pipeline failed at $(date)"
          echo "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
